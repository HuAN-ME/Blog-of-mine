<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客管理</title>
<style>
  :root { --text:#fff; --muted:rgba(255,255,255,0.6); --accent:#60a5fa; --border:rgba(255,255,255,0.12); --glass:rgba(255,255,255,0.06); --red:#ef4444; --green:#22c55e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif; background:#0d0d0d; color:var(--text); line-height:1.6; max-width:900px; margin:0 auto; padding:2rem 1.5rem; }
  h1 { font-size:1.5rem; margin-bottom:1.5rem; }
  h2 { font-size:1.15rem; margin-bottom:0.75rem; }
  input,textarea,select { font-family:inherit; font-size:0.95rem; padding:0.5rem 0.75rem; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,0.14); color:var(--text); width:100%; }
  input[type="date"] { color-scheme:dark; background:rgba(255,255,255,0.18); }
  select { background:rgba(255,255,255,0.18); cursor:pointer; }
  select option { background:#1a1a2e; color:#fff; }
  textarea { min-height:200px; resize:vertical; line-height:1.6; }
  label { display:block; font-size:0.85rem; color:var(--muted); margin-bottom:0.25rem; margin-top:1rem; }
  button { cursor:pointer; width:auto; font-weight:600; transition:opacity 0.15s; font-family:inherit; font-size:0.95rem; padding:0.5rem 0.75rem; border-radius:8px; }
  button:hover { opacity:0.8; }
  .btn-primary { background:rgba(255,255,255,0.15); color:#fff; border:1px solid var(--border); }
  .btn-danger { background:rgba(239,68,68,0.25); color:#fff; border:1px solid rgba(239,68,68,0.35); }
  .btn-ghost { background:none; color:var(--muted); border:none; padding:0.25rem 0.5rem; font-size:0.85rem; }
  .btn-ghost:hover { color:var(--text); }
  .card { background:var(--glass); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:16px; padding:1.25rem; margin-bottom:1rem; }
  .post-row { display:flex; justify-content:space-between; align-items:center; padding:0.75rem 0; border-bottom:1px solid var(--border); }
  .post-row:last-child { border-bottom:none; }
  .post-row .info { flex:1; }
  .post-row .title { font-weight:600; cursor:pointer; }
  .post-row .title:hover { opacity:0.7; }
  .post-row .meta { font-size:0.8rem; color:var(--muted); }
  .post-row .actions { display:flex; gap:0.5rem; }
  .hidden { display:none !important; }
  .error { color:var(--red); font-size:0.85rem; margin-top:0.5rem; }
  .success { color:var(--green); font-size:0.85rem; margin-top:0.5rem; }
  .form-group { margin-bottom:0.75rem; }
  .form-actions { display:flex; gap:0.5rem; margin-top:1rem; }
  .divider { border-top:1px solid var(--border); margin:1.5rem 0; }
  .tabs { display:flex; gap:1.5rem; margin-bottom:1.5rem; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .tabs button { background:none; border:none; color:var(--muted); font-size:0.95rem; cursor:pointer; padding:0.5rem 0; border-bottom:2px solid transparent; border-radius:0; font-weight:500; }
  .tabs button.active { color:var(--text); border-bottom-color:var(--accent); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .link-row { display:flex; gap:0.5rem; margin-bottom:0.5rem; align-items:center; }
  .link-row input { flex:1; }
  .btn-sm { padding:0.25rem 0.5rem; font-size:0.8rem; }
  .app-header { display:flex; justify-content:flex-end; align-items:center; padding:0 0 1rem 0; gap:0.75rem; font-size:0.9rem; color:var(--muted); }
  .app-header .username { color:var(--accent); font-weight:600; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:100; }
  .modal-box { background:#1a1a2e; border:1px solid var(--border); border-radius:12px; padding:1.5rem; max-width:360px; width:90%; text-align:center; }
  .modal-box p { margin-bottom:1.25rem; color:var(--text); }
  .modal-box .modal-actions { display:flex; gap:0.75rem; justify-content:center; }
  .btn-cancel { background:rgba(255,255,255,0.1); color:var(--muted); border:1px solid var(--border); }
  .editor-toolbar { display:flex; gap:0.25rem; margin-bottom:0.5rem; flex-wrap:wrap; }
  .editor-toolbar button { padding:0.25rem 0.5rem; font-size:0.8rem; background:rgba(255,255,255,0.08); border:1px solid var(--border); color:var(--text); border-radius:4px; cursor:pointer; }
  .editor-toolbar button:hover { background:rgba(255,255,255,0.15); }
  .editor-body { min-height:200px; padding:0.75rem; border:1px solid var(--border); border-radius:8px; background:rgba(255,255,255,0.14); color:var(--text); line-height:1.6; outline:none; }
  .editor-body:focus { border-color:var(--accent); }
  .editor-body img { max-width:100%; height:auto; }
  .editor-subtitle { min-height:2.5rem; font-size:0.95rem; padding:0.5rem 0.75rem; }
  .code-input-section { margin-top:0.5rem; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .code-input-bar { display:flex; gap:0.5rem; padding:0.5rem; background:rgba(255,255,255,0.04); border-bottom:1px solid var(--border); align-items:center; }
  .code-lang-select { width:auto; min-width:140px; padding:0.35rem 0.6rem; font-size:0.8rem; background:rgba(255,255,255,0.12); border:1px solid var(--border); border-radius:6px; color:var(--text); }
  .btn-code-embed { padding:0.35rem 0.75rem; font-size:0.8rem; background:rgba(96,165,250,0.18); color:var(--accent); border:1px solid rgba(96,165,250,0.25); border-radius:6px; cursor:pointer; white-space:nowrap; }
  .btn-code-embed:hover { background:rgba(96,165,250,0.28); opacity:1; }
  .code-textarea { min-height:120px; padding:0.75rem; border:none; border-radius:0; background:rgba(0,0,0,0.25); color:var(--text); font-family:"JetBrains Mono","Fira Code","Cascadia Code",Consolas,monospace; font-size:0.85rem; line-height:1.55; resize:vertical; width:100%; }
  .code-textarea:focus { outline:none; box-shadow:0 0 0 1px var(--accent); }
  .editor-body pre { background:rgba(0,0,0,0.4); border-radius:8px; padding:0.75rem; overflow-x:auto; font-size:0.85rem; margin:0.5rem 0; border:1px solid var(--border); white-space:pre-wrap; }
  .editor-body pre code { font-family:"JetBrains Mono","Fira Code","Cascadia Code",Consolas,monospace; font-size:0.85rem; }
  .existing-tags { display:flex; gap:0.35rem; flex-wrap:wrap; }
  .tag-chip { padding:0.2rem 0.5rem; font-size:0.75rem; background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.2); border-radius:12px; color:var(--accent); cursor:pointer; white-space:nowrap; transition:background 0.15s; }
  .tag-chip:hover { background:rgba(96,165,250,0.22); }
  .tag-filter-bar { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.75rem; flex-wrap:wrap; }
  .tag-filter-label { color:var(--muted); font-size:0.8rem; flex-shrink:0; }
  .tag-filter-pill { display:inline-block; padding:0.15rem 0.5rem; font-size:0.75rem; border-radius:12px; background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); cursor:pointer; white-space:nowrap; transition:all 0.15s; }
  .tag-filter-pill:hover { border-color:var(--accent); color:#fff; }
  .tag-filter-pill.selected { background:rgba(96,165,250,0.18); border-color:var(--accent); color:var(--accent); font-weight:600; }
</style>
</head>
<body>

<div id="login-gate" style="max-width:400px;margin:4rem auto 0">
  <div class="card">
    <h2>博客管理 - 登录</h2>
    <div class="form-group"><label>账户</label><input type="text" id="lg-user" placeholder="管理员账户" onkeydown="if(event.key=='Enter')document.getElementById('lg-pass').focus()"></div>
    <div class="form-group"><label>密码</label><input type="password" id="lg-pass" placeholder="请输入密码" onkeydown="if(event.key=='Enter')doLogin()"></div>
    <div id="lg-error" class="error hidden"></div>
    <div style="margin-top:1rem"><button class="btn-primary" onclick="doLogin()">登录</button></div>
    <div style="margin-top:0.75rem;display:flex;justify-content:space-between;align-items:center">
      <a href="/" style="color:var(--muted);font-size:0.85rem;text-decoration:none">← 返回博客</a>
      <a href="javascript:showForgot()" style="color:var(--accent);font-size:0.85rem;text-decoration:none">忘记密码</a>
    </div>
  </div>
</div>

<div id="forgot-password" class="hidden" style="max-width:400px;margin:4rem auto 0">
  <div class="card">
    <h2>重置密码</h2>
    <div class="form-group"><label>账户</label><input type="text" id="fg-user" placeholder="管理员账户"></div>
    <div class="form-group"><label>新密码</label><input type="password" id="fg-new-pw" placeholder="新密码（8-32位，含大小写字母和数字）"></div>
    <div class="form-group"><input type="password" id="fg-new-pw2" placeholder="确认新密码"></div>
    <div id="fg-code-section">
      <div class="form-group"><input type="text" id="fg-code" placeholder="邮箱验证码（6位）" maxlength="6"></div>
      <div style="margin-bottom:0.75rem"><button class="btn-primary btn-sm" id="fg-send-btn" onclick="sendResetCode()">发送验证码到邮箱</button></div>
    </div>
    <div id="fg-error" class="error hidden"></div>
    <div id="fg-msg" class="success hidden"></div>
    <div style="margin-top:1rem"><button class="btn-primary" onclick="doResetPassword()">重置密码</button></div>
    <div style="margin-top:0.75rem"><a href="javascript:showLogin()" style="color:var(--muted);font-size:0.85rem;text-decoration:none">← 返回登录</a></div>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <span>欢迎，<span class="username" id="header-username">admin</span></span>
    <button class="btn-ghost" onclick="showLogoutConfirm()">退出登录</button>
  </div>
  <div class="tabs">
    <button class="active" onclick="switchTab('posts')">文章管理</button>
    <button onclick="switchTab('profile')">个人信息</button>
    <button onclick="switchTab('settings')">站点设置</button>
    <button onclick="switchTab('timeline')">时间轴管理</button>
    <button onclick="switchTab('account')">账户安全</button>
    <button onclick="switchTab('visits')">访问统计</button>
    <button onclick="switchTab('messages')">留言管理</button>
  </div>

  <div id="tab-posts" class="tab-panel active">
    <div id="tag-filter-bar" class="tag-filter-bar hidden">
      <span class="tag-filter-label">筛选：</span>
      <span id="tag-filter-pills"></span>
      <button class="btn-primary btn-sm" onclick="applyTagFilter()">确认</button>
      <button class="btn-ghost btn-sm" onclick="clearTagFilter()">清除</button>
    </div>
    <div id="post-list-container" class="card"></div>
    <div style="margin-top:1rem"><button class="btn-primary" onclick="showEditor()">+ 新建文章</button></div>
  </div>

  <div id="tab-profile" class="tab-panel">
    <div class="card">
      <div class="form-group"><label>头像</label>
        <div style="display:flex;gap:0.75rem;align-items:center">
          <div id="pf-avatar-preview" style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.1);background-size:cover;background-position:center;flex-shrink:0"></div>
          <div>
            <input type="file" id="pf-avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar()">
            <button class="btn-primary btn-sm" onclick="document.getElementById('pf-avatar-file').click()">上传头像</button>
            <span id="pf-avatar-name" style="color:var(--muted);font-size:0.8rem;margin-left:0.5rem"></span>
          </div>
        </div>
      </div>
      <div class="form-group"><label>姓名</label><input type="text" id="pf-name" placeholder="你的名字或昵称"></div>
      <div class="form-group"><label>简介</label><input type="text" id="pf-bio" placeholder="一句话介绍自己"></div>
      <div class="form-group"><label>个性标签</label><div id="pf-tags"></div><button class="btn-primary btn-sm" onclick="addPfTag()" style="margin-top:0.5rem">+ 添加标签</button></div>
      <div style="margin-top:1rem"><button class="btn-primary" onclick="saveProfile()">保存信息</button></div>
      <div id="pf-msg" class="success hidden">个人信息已保存</div>
    </div>
  </div>

  <div id="tab-settings" class="tab-panel">
    <div class="card">
      <div class="form-group"><label>博客标题</label><input type="text" id="cfg-title"></div>
      <div class="form-group"><label>副标题</label>
          <div class="editor-toolbar" style="margin-bottom:4px">
            <button onclick="subExec('bold')"><b>B</b></button>
            <button onclick="subExec('italic')"><i>I</i></button>
            <button onclick="subExec('underline')"><u>U</u></button>
          </div>
          <div id="cfg-subtitle" class="editor-body editor-subtitle" contenteditable="true"></div>
        </div>
      <div class="form-group"><label>页脚文字</label><input type="text" id="cfg-footer"></div>
      <div class="form-group"><label>社交链接</label><div id="cfg-links"></div><button class="btn-primary btn-sm" onclick="addLink()" style="margin-top:0.5rem">+ 添加链接</button></div>
      <div class="form-group"><label>背景类型</label><select id="cfg-bg-type" style="width:auto" onchange="updateBgFileAccept()"><option value="">无</option><option value="image">图片</option><option value="video">视频</option></select></div>
      <div class="form-group"><label>背景文件</label>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <input type="file" id="cfg-bg-file" accept="image/*,video/*" style="display:none" onchange="uploadBgFile()">
          <button class="btn-primary btn-sm" onclick="document.getElementById('cfg-bg-file').click()">选择文件</button>
          <span id="cfg-bg-name" style="color:var(--muted);font-size:0.85rem"></span>
        </div>
        <div id="cfg-bg-preview" style="margin-top:0.5rem"></div>
      </div>
      <div style="margin-top:1rem"><button class="btn-primary" onclick="saveConfig()">保存设置</button></div>
      <div id="cfg-msg" class="success hidden">设置已保存</div>
    </div>
  </div>

  <div id="tab-timeline" class="tab-panel">
    <div id="timeline-list-container" class="card"></div>
    <div style="margin-top:1rem"><button class="btn-primary" onclick="showTimelineEditor()">+ 新建事件</button></div>
  </div>

  <div id="tab-account" class="tab-panel">
    <div class="card">
      <div id="account-email-status" style="margin-bottom:1rem;font-size:0.9rem;color:var(--muted)">加载中...</div>

      <div class="form-group"><label>修改用户名</label></div>
      <div class="form-group"><input type="text" id="acc-username" placeholder="新用户名"></div>
      <button class="btn-primary" onclick="changeUsername()">修改用户名</button>
      <div id="acc-user-msg" class="success hidden"></div>

      <div class="divider" style="margin:0.75rem 0"></div>
      <div class="form-group"><label>修改密码</label></div>
      <div class="form-group"><input type="password" id="acc-old-pw" placeholder="旧密码"></div>
      <div class="form-group"><input type="password" id="acc-new-pw" placeholder="新密码（8-32位，含大小写字母和数字）"></div>
      <div class="form-group"><input type="password" id="acc-new-pw2" placeholder="确认新密码"></div>
      <div id="acc-pw-code-section" class="hidden">
        <div class="form-group"><input type="text" id="acc-pw-code" placeholder="邮箱验证码（6位）" maxlength="6"></div>
        <div style="margin-bottom:0.75rem"><button class="btn-primary btn-sm" id="acc-pw-send-btn" onclick="sendPwCode()">发送验证码到邮箱</button></div>
      </div>
      <button class="btn-primary" onclick="changePassword()">修改密码</button>
      <div id="acc-pw-msg" class="success hidden"></div>

      <div class="divider" style="margin:1.5rem 0"></div>
      <div class="form-group"><label>邮箱</label></div>
      <div class="form-group"><input type="email" id="acc-email" placeholder="your@email.com"></div>
      <div id="acc-email-code-section" class="hidden">
        <div class="form-group"><input type="text" id="acc-email-code" placeholder="验证码（6位）" maxlength="6"></div>
        <div style="margin-bottom:0.75rem"><button class="btn-primary btn-sm" id="acc-email-send-btn" onclick="sendEmailCode()">发送验证码</button></div>
      </div>
      <div id="acc-email-hint" style="font-size:0.8rem;color:var(--red);margin-bottom:0.5rem" class="hidden"></div>
      <button class="btn-primary" id="acc-email-action-btn" onclick="emailAction()">绑定邮箱</button>
      <div id="acc-email-msg" class="success hidden"></div>
    </div>
  </div>

  <div id="tab-visits" class="tab-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 style="font-size:1.1rem;margin:0">每日访问量</h2>
        <select id="visits-range" onchange="loadVisits()" style="background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text);padding:0.25rem 0.5rem;border-radius:6px;font-size:0.9rem;cursor:pointer">
          <option value="7">近7天</option>
          <option value="30" selected>近30天</option>
          <option value="90">近90天</option>
        </select>
      </div>
      <canvas id="visits-canvas" style="width:100%;height:300px"></canvas>
    </div>
  </div>

  <div id="tab-messages" class="tab-panel">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <h2 style="font-size:1.1rem;margin:0">留言管理</h2>
        <span id="msg-count" style="color:var(--muted);font-size:0.85rem"></span>
      </div>
      <div id="msg-list-admin"></div>
    </div>
  </div>

  <div id="editor" class="hidden">
    <div class="divider"></div>
    <h2 id="editor-title">新建文章</h2>
    <div class="form-group"><label>标题</label><input type="text" id="edit-title" placeholder="文章标题"></div>
    <div class="form-group"><label>日期</label><input type="date" id="edit-date"></div>
    <div class="form-group"><label>摘要</label><input type="text" id="edit-excerpt" placeholder="简短摘要（可选）"></div>
    <div class="form-group">
      <label>内容</label>
      <div class="editor-toolbar" id="editor-toolbar">
        <button onclick="execCmd('bold')"><b>B</b></button>
        <button onclick="execCmd('italic')"><i>I</i></button>
        <button onclick="execCmd('underline')"><u>U</u></button>
        <button onclick="execCmd('strikeThrough')"><s>S</s></button>
        <button onclick="insertLink()">链接</button>
        <button onclick="insertImage()">插入图片 URL</button>
        <button onclick="document.getElementById('img-file-input').click()">上传图片</button>
      </div>
      <div class="editor-body" id="edit-content" contenteditable="true"></div>
      <div class="code-input-section">
        <div class="code-input-bar">
          <select id="code-lang" class="code-lang-select">
            <option value="">纯文本</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="css">CSS</option>
            <option value="html">HTML</option>
            <option value="typescript">TypeScript</option>
            <option value="json">JSON</option>
            <option value="bash">Bash</option>
            <option value="sql">SQL</option>
          </select>
          <button class="btn-code-embed" onclick="embedCode()">嵌入代码</button>
        </div>
        <textarea id="code-textarea" class="code-textarea" placeholder="在此输入代码…" spellcheck="false" onpaste="return true"></textarea>
      </div>
      <input type="file" id="img-file-input" accept="image/*" style="display:none" onchange="uploadAndInsert()">
    </div>
    <div class="form-group"><label>文章配图</label><div id="edit-images"></div><div style="display:flex;gap:0.5rem;margin-top:0.5rem"><button class="btn-primary btn-sm" onclick="addImage()">+ 添加图片 URL</button><button class="btn-primary btn-sm" onclick="document.getElementById('img-gallery-input').click()">上传配图</button><input type="file" id="img-gallery-input" accept="image/*" style="display:none" onchange="uploadGalleryImage()"></div><p style="font-size:0.8rem;color:var(--muted);margin-top:0.25rem">建议使用 16:9 比例图片。多张图片将自动轮播展示。</p></div>
    <div class="form-group"><label>文章标签（最多4个）</label><div id="edit-tags"></div><div style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;align-items:center"><button class="btn-primary btn-sm" onclick="addEditTag()">+ 添加标签</button><span id="existing-tags" class="existing-tags"></span></div></div>
    <div class="form-actions"><button class="btn-primary" id="save-btn" onclick="savePost()">保存</button><button class="btn-ghost" onclick="hideEditor()">取消</button></div>
    <div id="edit-error" class="error hidden"></div>
    <div id="edit-success" class="success hidden"></div>
  </div>

  <div id="timeline-editor" class="hidden">
    <div class="divider"></div>
    <h2 id="tl-editor-title">新建事件</h2>
    <div class="form-group"><label>日期</label><input type="date" id="tl-date"></div>
    <div class="form-group"><label>标题</label><input type="text" id="tl-title" placeholder="事件标题"></div>
    <div class="form-group"><label>描述</label><input type="text" id="tl-desc" placeholder="简短描述（可选）"></div>
    <div class="form-group"><label>图标</label><select id="tl-icon" style="width:auto"><option value="">无</option><option value="code">code</option><option value="book">book</option><option value="star">star</option><option value="work">work</option><option value="education">education</option><option value="heart">heart</option><option value="award">award</option><option value="coffee">coffee</option></select></div>
    <div class="form-actions"><button class="btn-primary" id="tl-save-btn" onclick="saveTimelineEvent()">保存</button><button class="btn-ghost" onclick="hideTimelineEditor()">取消</button></div>
    <div id="tl-error" class="error hidden"></div>
    <div id="tl-success" class="success hidden"></div>
  </div>

  <div id="logout-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <p>确认退出登录？</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="cancelLogout()">取消</button>
        <button class="btn-danger" onclick="doLogout()">确认</button>
      </div>
    </div>
  </div>
</div>

<script>
// Login gate
const API='/api/posts'; const TAPI='/api/timeline';
let token=''; let editingId=null; let tlEditingId=null; let currentUser='';

function getHeaders(){ return {'Content-Type':'application/json'}; }

function showLogin(msg){
  document.getElementById('app').classList.add('hidden');
  document.getElementById('forgot-password').classList.add('hidden');
  document.getElementById('login-gate').classList.remove('hidden');
  if(msg) document.getElementById('lg-error').textContent=msg;
  document.getElementById('lg-error').classList.toggle('hidden',!msg);
  document.getElementById('lg-user').focus();
}

function showApp(){
  document.getElementById('login-gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('header-username').textContent=currentUser;
  loadPosts();
}

async function tryAutoLogin(){
  try{
    const res=await fetch('/api/auth/me',{credentials:'include'});
    const d=await res.json();
    if(res.ok){ currentUser=d.username; showApp(); return; }
  }catch(e){}
  showLogin();
}

async function doLogin(){
  const u=document.getElementById('lg-user').value.trim();
  const p=document.getElementById('lg-pass').value;
  if(!u||!p){ showLogin('请输入账户和密码'); return; }
  try{
    const res=await fetch('/api/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(res.ok){
      const d=await res.json();
      token=d.token;
      currentUser=d.username;
      showApp();
    }else{
      const d=await res.json().catch(()=>({}));
      showLogin(d.error||'账户或密码错误');
    }
  }catch(e){ showLogin('无法连接服务器'); console.error(e); }
}

function showLogoutConfirm(){
  document.getElementById('logout-modal').classList.remove('hidden');
}

function cancelLogout(){
  document.getElementById('logout-modal').classList.add('hidden');
}

async function doLogout(){
  document.getElementById('logout-modal').classList.add('hidden');
  token='';
  currentUser='';
  try{ await fetch('/api/auth/logout',{method:'POST',credentials:'include'}); }catch(e){}
  showLogin();
}

tryAutoLogin();

// Posts
async function loadPosts(){
  const res=await fetch(API); const posts=await res.json(); postsRaw=posts; const c=document.getElementById('post-list-container');
  allTags=[...new Set(posts.flatMap(p=>p.tags||[]).filter(Boolean))];
  allTags.sort(new Intl.Collator('zh-Hans',{sensitivity:'base'}).compare);
  if(!posts.length){ c.innerHTML='<p style="color:var(--muted)">还没有文章。</p>'; document.getElementById('tag-filter-bar').classList.add('hidden'); return; }
  c.innerHTML=posts.map(p=>`<div class="post-row"><div class="info"><div class="title" onclick="editPost(${p.id})">${esc(p.title)}</div><div class="meta">${p.date}${(p.tags||[]).length ? ' <span style="color:var(--accent);font-size:0.75rem">' + p.tags.map(t => esc(t)).join(' · ') + '</span>' : ''}</div></div><div class="actions"><button class="btn-ghost" onclick="editPost(${p.id})">编辑</button><button class="btn-ghost btn-danger" onclick="deletePost(${p.id})">删除</button></div></div>`).join('');
  renderTagFilterPills();
}

function showEditor(){
  editingId=null; document.getElementById('editor-title').textContent='新建文章';
  document.getElementById('edit-title').value=''; document.getElementById('edit-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('edit-excerpt').value=''; document.getElementById('edit-content').innerHTML='';
  editImages=[]; renderEditImages(); editTags=[]; renderEditTags();
  document.getElementById('edit-error').classList.add('hidden');
  document.getElementById('edit-success').classList.add('hidden'); document.getElementById('save-btn').textContent='保存';
  document.getElementById('code-textarea').value='';
  document.getElementById('editor').classList.remove('hidden'); document.getElementById('edit-title').focus();
}
function hideEditor(){ document.getElementById('editor').classList.add('hidden'); }

async function editPost(id){
  const res=await fetch(API); const posts=await res.json(); const post=posts.find(p=>p.id===id);
  if(!post) return; editingId=id; document.getElementById('editor-title').textContent='编辑文章';
  document.getElementById('edit-title').value=post.title; document.getElementById('edit-date').value=post.date;
  document.getElementById('edit-excerpt').value=post.excerpt||''; document.getElementById('edit-content').innerHTML=post.content;
  document.querySelectorAll('#edit-content pre').forEach(pre => pre.contentEditable = 'false');
  editImages=post.images||[]; renderEditImages(); editTags=post.tags||[]; renderEditTags();
  document.getElementById('edit-error').classList.add('hidden');
  document.getElementById('edit-success').classList.add('hidden'); document.getElementById('save-btn').textContent='更新';
  document.getElementById('code-textarea').value='';
  document.getElementById('editor').classList.remove('hidden'); document.getElementById('edit-title').focus();
}

async function savePost(){
  const title=document.getElementById('edit-title').value.trim(); const date=document.getElementById('edit-date').value;
  const excerpt=document.getElementById('edit-excerpt').value.trim(); const content=document.getElementById('edit-content').innerHTML.trim();
  if(!title||!date||!content){ document.getElementById('edit-error').textContent='标题、日期和内容为必填项'; document.getElementById('edit-error').classList.remove('hidden'); return; }
  const url=editingId?`${API}/${editingId}`:API; const method=editingId?'PUT':'POST';
  try{
    const res=await fetch(url,{method,credentials:'include',headers:getHeaders(),body:JSON.stringify({title,date,excerpt,content,images:editImages.filter(u=>u.trim()),tags:editTags.filter(t=>t.trim())})});
    if(res.ok){ document.getElementById('edit-success').textContent=editingId?'文章已更新':'文章已创建'; document.getElementById('edit-success').classList.remove('hidden'); document.getElementById('edit-error').classList.add('hidden'); if(!editingId)hideEditor(); loadPosts(); }
    else{ const d=await res.json(); document.getElementById('edit-error').textContent=d.error||'保存失败'; document.getElementById('edit-error').classList.remove('hidden'); }
  }catch(e){console.error('Save post error:',e);document.getElementById('edit-error').textContent='网络错误';document.getElementById('edit-error').classList.remove('hidden');}
}

async function deletePost(id){ if(!confirm('确认删除这篇文章？'))return; try{ await fetch(`${API}/${id}`,{method:'DELETE',credentials:'include',headers:getHeaders()}); loadPosts(); if(editingId===id)hideEditor(); }catch(e){console.error(e)} }

function switchTab(name){
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  const btns=document.querySelectorAll('.tabs button'); const map={posts:0,profile:1,settings:2,timeline:3,account:4,visits:5,messages:6};
  if(map[name]!==undefined)btns[map[name]].classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active')); document.getElementById('tab-'+name).classList.add('active');
  if(name==='settings')loadSiteConfig(); if(name==='profile')loadProfileConfig(); if(name==='timeline')loadTimeline(); if(name==='account')loadAccountInfo(); if(name==='visits')loadVisits(); if(name==='messages')loadAdminMessages();
}

// Profile
let pfTags=[];
function renderPfTags(tags){ pfTags=tags||[]; document.getElementById('pf-tags').innerHTML=pfTags.map((t,i)=>`<div class="link-row"><input type="text" value="${t}" placeholder="标签" onchange="pfTags[${i}]=this.value"><button class="btn-danger btn-sm" onclick="pfTags.splice(${i},1);renderPfTags(pfTags)">删除</button></div>`).join(''); }
function addPfTag(){ pfTags.push(''); renderPfTags(pfTags); }
async function loadProfileConfig(){
  try{
    const res=await fetch('/api/config'); const cfg=await res.json(); const p=cfg.profile||{};
    pfAvatarUrl=p.avatar||''; document.getElementById('pf-name').value=p.name||'';
    document.getElementById('pf-bio').value=p.bio||''; renderPfTags(p.tags||[]);
    renderPfAvatarPreview();
  }catch(e){console.error(e)}
}
async function saveProfile(){
  try{
    const res=await fetch('/api/config'); const cfg=await res.json();
    cfg.profile={ avatar:pfAvatarUrl, name:document.getElementById('pf-name').value.trim(), bio:document.getElementById('pf-bio').value.trim(), tags:pfTags.filter(t=>t.trim()) };
    const ur=await fetch('/api/config',{method:'PUT',credentials:'include',headers:getHeaders(),body:JSON.stringify(cfg)});
    if(ur.ok)document.getElementById('pf-msg').classList.remove('hidden');
  }catch(e){console.error(e)}
}

// Profile helpers
let pfAvatarUrl='';
function renderPfAvatarPreview(){
  const el=document.getElementById('pf-avatar-preview');
  if(el) el.style.backgroundImage=pfAvatarUrl ? `url(${pfAvatarUrl})` : 'none';
}
async function uploadAvatar(){
  const file=document.getElementById('pf-avatar-file').files[0];
  if(!file)return;
  const fd=new FormData(); fd.append('file',file);
  try{
    const res=await fetch('/api/upload-avatar',{method:'POST',credentials:'include',body:fd});
    if(res.ok){
      const d=await res.json();
      pfAvatarUrl=d.url;
      document.getElementById('pf-avatar-name').textContent=file.name;
      renderPfAvatarPreview();
    }else{
      const err=await res.json().catch(()=>({}));
      alert('上传失败: '+(err.error||res.status));
    }
  }catch(e){ alert('上传失败: 网络错误'); }
  document.getElementById('pf-avatar-file').value='';
}

// Settings
let cfgLinks=[];
function renderCfgLinks(links){ cfgLinks=links; document.getElementById('cfg-links').innerHTML=links.map((l,i)=>`<div class="link-row"><input type="text" value="${l.label}" placeholder="名称" onchange="cfgLinks[${i}].label=this.value"><input type="text" value="${l.url}" placeholder="URL" onchange="cfgLinks[${i}].url=this.value"><button class="btn-danger btn-sm" onclick="cfgLinks.splice(${i},1);renderCfgLinks(cfgLinks)">删除</button></div>`).join(''); }
function addLink(){ cfgLinks.push({label:'',url:''}); renderCfgLinks(cfgLinks); }

// Site Config
let cfgBgUrl = '';
async function loadSiteConfig(){
  try{
    const res=await fetch('/api/config'); const cfg=await res.json();
    document.getElementById('cfg-title').value=cfg.title;
    document.getElementById('cfg-subtitle').innerHTML=cfg.subtitle||'';
    document.getElementById('cfg-footer').value=cfg.footer; renderCfgLinks(cfg.links||[]);
    document.getElementById('cfg-bg-type').value=(cfg.background&&cfg.background.type)||'';
    if(cfg.background&&cfg.background.url){
      cfgBgUrl=cfg.background.url;
      renderBgPreview(cfg.background.url);
    }
  }catch(e){console.error(e)}
}
async function saveConfig(){
  const body={ title:document.getElementById('cfg-title').value.trim(), subtitle:document.getElementById('cfg-subtitle').innerHTML.trim(), footer:document.getElementById('cfg-footer').value.trim(), links:cfgLinks.filter(l=>l.label&&l.url), background:{ type:document.getElementById('cfg-bg-type').value, url:cfgBgUrl } };
  try{ const res=await fetch('/api/config',{method:'PUT',credentials:'include',headers:getHeaders(),body:JSON.stringify(body)}); if(res.ok)document.getElementById('cfg-msg').classList.remove('hidden'); }catch(e){console.error(e)}
}

function subExec(cmd){
  document.execCommand(cmd,false,null);
  document.getElementById('cfg-subtitle').focus();
}

function updateBgFileAccept(){
  const sel=document.getElementById('cfg-bg-type').value;
  const inp=document.getElementById('cfg-bg-file');
  if(sel==='image') inp.accept='image/*';
  else if(sel==='video') inp.accept='video/*';
  else inp.accept='image/*,video/*';
}

function renderBgPreview(url){
  const el=document.getElementById('cfg-bg-preview');
  if(!url){ el.innerHTML=''; return; }
  const bgType=document.getElementById('cfg-bg-type').value;
  if(bgType==='video'){
    el.innerHTML='<video src="'+url+'" controls style="max-width:240px;max-height:135px;border-radius:6px"></video>';
  }else{
    el.innerHTML='<img src="'+url+'" style="max-width:240px;max-height:135px;border-radius:6px;object-fit:cover">';
  }
}

async function uploadBgFile(){
  const file=document.getElementById('cfg-bg-file').files[0];
  if(!file)return;
  const fd=new FormData(); fd.append('file',file);
  try{
    const res=await fetch('/api/upload-bg',{method:'POST',credentials:'include',body:fd});
    if(res.ok){
      const d=await res.json();
      cfgBgUrl=d.url;
      document.getElementById('cfg-bg-name').textContent=file.name;
      renderBgPreview(d.url);
    }else{
      const err=await res.json().catch(()=>({}));
      alert('上传失败: '+(err.error||res.status));
    }
  }catch(e){ alert('上传失败: 网络错误'); }
  document.getElementById('cfg-bg-file').value='';
}

// Timeline
async function loadTimeline(){
  try{
    const res=await fetch(TAPI); const evts=await res.json(); const c=document.getElementById('timeline-list-container');
    if(!evts.length){ c.innerHTML='<p style="color:var(--muted)">还没有事件。</p>'; return; }
    c.innerHTML=evts.map(e=>`<div class="post-row"><div class="info"><div class="title">${e.icon?'['+e.icon+'] ':''}${esc(e.title)}</div><div class="meta">${e.date}</div></div><div class="actions"><button class="btn-ghost" onclick="showTimelineEditor(${e.id})">编辑</button><button class="btn-ghost btn-danger" onclick="deleteTimelineEvent(${e.id})">删除</button></div></div>`).join('');
  }catch(e){console.error('Timeline load error:',e)}
}
function showTimelineEditor(id){
  tlEditingId=id||null; document.getElementById('tl-editor-title').textContent=id?'编辑事件':'新建事件';
  if(id){ loadTimelineForEdit(id); }else{ document.getElementById('tl-date').value=''; document.getElementById('tl-title').value=''; document.getElementById('tl-desc').value=''; document.getElementById('tl-icon').value=''; }
  document.getElementById('tl-error').classList.add('hidden'); document.getElementById('tl-success').classList.add('hidden');
  document.getElementById('tl-save-btn').textContent=id?'更新':'保存'; document.getElementById('timeline-editor').classList.remove('hidden');
}
function hideTimelineEditor(){ document.getElementById('timeline-editor').classList.add('hidden'); }
async function loadTimelineForEdit(id){
  try{
    const res=await fetch(TAPI); const evts=await res.json(); const e=evts.find(ev=>ev.id===id);
    if(!e)return; document.getElementById('tl-date').value=e.date; document.getElementById('tl-title').value=e.title;
    document.getElementById('tl-desc').value=e.description||''; document.getElementById('tl-icon').value=e.icon||'';
  }catch(e){console.error(e)}
}
async function saveTimelineEvent(){
  const date=document.getElementById('tl-date').value; const title=document.getElementById('tl-title').value.trim();
  const description=document.getElementById('tl-desc').value.trim(); const icon=document.getElementById('tl-icon').value;
  if(!date||!title){ document.getElementById('tl-error').textContent='日期和标题为必填项'; document.getElementById('tl-error').classList.remove('hidden'); return; }
  const url=tlEditingId?`${TAPI}/${tlEditingId}`:TAPI; const method=tlEditingId?'PUT':'POST';
  try{
    const res=await fetch(url,{method,credentials:'include',headers:getHeaders(),body:JSON.stringify({date,title,description,icon})});
    if(res.ok){ document.getElementById('tl-success').textContent=tlEditingId?'事件已更新':'事件已创建'; document.getElementById('tl-success').classList.remove('hidden'); document.getElementById('tl-error').classList.add('hidden'); if(!tlEditingId)hideTimelineEditor(); loadTimeline(); }
    else{ const d=await res.json(); document.getElementById('tl-error').textContent=d.error||'保存失败'; document.getElementById('tl-error').classList.remove('hidden'); }
  }catch(e){console.error('Save timeline error:',e);document.getElementById('tl-error').textContent='网络错误';document.getElementById('tl-error').classList.remove('hidden');}
}
async function deleteTimelineEvent(id){ if(!confirm('确认删除这个事件？'))return; try{ await fetch(`${TAPI}/${id}`,{method:'DELETE',credentials:'include',headers:getHeaders()}); loadTimeline(); }catch(e){console.error(e)} }

// Helpers
function execCmd(cmd,val){
  document.execCommand(cmd,false,val);
  document.getElementById('edit-content').focus();
}

function insertLink(){
  const url=prompt('链接 URL:');
  if(!url)return;
  const sel=window.getSelection();
  if(sel.toString()){ execCmd('createLink',url); return; }
  const text=prompt('链接文字:')||url;
  document.execCommand('insertHTML',false,`<a href="${url}" target="_blank">${text}</a>`);
  document.getElementById('edit-content').focus();
}

function insertImage(url){
  if(!url){ url=prompt('图片 URL:'); if(!url)return; }
  const div=document.getElementById('edit-content');
  div.focus();
  document.execCommand('insertHTML',false,`<img src="${url}" alt="">`);
}

function embedCode(){
  const sel=document.getElementById('code-lang');
  const lang=sel.value;
  const langName=sel.options[sel.selectedIndex].text;
  const code=document.getElementById('code-textarea').value;
  if(!code.trim())return;
  const escaped=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const langClass=lang?` class="language-${lang}"`:'';
  const langAttr=lang?` data-lang="${langName}"`:'';
  const html=`<pre${langAttr} contenteditable="false"><code${langClass}>${escaped}</code></pre>`;
  document.getElementById('edit-content').focus();
  document.execCommand('insertHTML',false,html);
  // 将光标移到代码块之后，避免卡死在不可编辑区域内
  const ed=document.getElementById('edit-content');
  const pres=ed.querySelectorAll('pre[contenteditable="false"]');
  if(pres.length){const r=document.createRange();r.setStartAfter(pres[pres.length-1]);r.collapse(true);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}
  document.getElementById('code-textarea').value='';
}

let editImages=[];
let editTags=[];
let allTags=[];
let selectedFilterTags=[];
let postsRaw=[];
function renderEditImages(){ document.getElementById('edit-images').innerHTML=editImages.map((u,i)=>`<div class="link-row"><input type="text" value="${u}" placeholder="图片 URL" onchange="editImages[${i}]=this.value"><button class="btn-danger btn-sm" onclick="editImages.splice(${i},1);renderEditImages()">删除</button></div>`).join(''); }
function addImage(){ editImages.push(''); renderEditImages(); }
function renderEditTags(){ const el=document.getElementById('edit-tags'); if(!el)return; el.innerHTML=editTags.map((t,i)=>`<div class="link-row"><input type="text" value="${t}" placeholder="标签" onchange="editTags[${i}]=this.value;renderExistingTags()"><button class="btn-danger btn-sm" onclick="editTags.splice(${i},1);renderEditTags()">删除</button></div>`).join(''); renderExistingTags(); }
function addEditTag(){ if(editTags.length>=4)return; editTags.push(''); renderEditTags(); }
function addExistingTag(tag){
  if(editTags.length>=4)return;
  if(editTags.includes(tag))return;
  editTags.push(tag);
  renderEditTags();
}
function renderExistingTags(){
  const el=document.getElementById('existing-tags');
  if(!el)return;
  const available=allTags.filter(t=>!editTags.includes(t));
  el.innerHTML=available.map(t=>`<span class="tag-chip" onclick="addExistingTag('${esc(t)}')">${esc(t)}</span>`).join('');
}
function renderTagFilterPills(){
  const el=document.getElementById('tag-filter-pills');
  const bar=document.getElementById('tag-filter-bar');
  if(!el||!bar)return;
  if(!allTags.length){ bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  el.innerHTML=allTags.map(t=>{
    const sel=selectedFilterTags.includes(t);
    return `<span class="tag-filter-pill${sel?' selected':''}" onclick="toggleFilterTag('${esc(t)}')">${esc(t)}</span>`;
  }).join('');
}
function toggleFilterTag(tag){
  const idx=selectedFilterTags.indexOf(tag);
  if(idx>-1)selectedFilterTags.splice(idx,1);
  else selectedFilterTags.push(tag);
  renderTagFilterPills();
}
function applyTagFilter(){
  const res=postsRaw.filter(p=>selectedFilterTags.every(t=>(p.tags||[]).includes(t)));
  const c=document.getElementById('post-list-container');
  if(!res.length){ c.innerHTML='<p style="color:var(--muted)">没有匹配的文章。</p>'; return; }
  c.innerHTML=res.map(p=>`<div class="post-row"><div class="info"><div class="title" onclick="editPost(${p.id})">${esc(p.title)}</div><div class="meta">${p.date}${(p.tags||[]).length ? ' <span style="color:var(--accent);font-size:0.75rem">' + p.tags.map(t=>esc(t)).join(' · ') + '</span>' : ''}</div></div><div class="actions"><button class="btn-ghost" onclick="editPost(${p.id})">编辑</button><button class="btn-ghost btn-danger" onclick="deletePost(${p.id})">删除</button></div></div>`).join('');
}
function clearTagFilter(){
  selectedFilterTags=[];
  renderTagFilterPills();
  const c=document.getElementById('post-list-container');
  if(!postsRaw||!postsRaw.length){ c.innerHTML='<p style="color:var(--muted)">还没有文章。</p>'; return; }
  c.innerHTML=postsRaw.map(p=>`<div class="post-row"><div class="info"><div class="title" onclick="editPost(${p.id})">${esc(p.title)}</div><div class="meta">${p.date}${(p.tags||[]).length ? ' <span style="color:var(--accent);font-size:0.75rem">' + p.tags.map(t=>esc(t)).join(' · ') + '</span>' : ''}</div></div><div class="actions"><button class="btn-ghost" onclick="editPost(${p.id})">编辑</button><button class="btn-ghost btn-danger" onclick="deletePost(${p.id})">删除</button></div></div>`).join('');
}
async function uploadAndInsert(){
  const file=document.getElementById('img-file-input').files[0];
  if(!file)return;
  const fd=new FormData(); fd.append('file',file);
  try{
    const res=await fetch('/api/upload',{method:'POST',credentials:'include',body:fd});
    if(res.ok){ const d=await res.json(); insertImage(d.url); }
    else{ const err=await res.json().catch(()=>({})); alert('上传失败: '+(err.error||res.status)); }
  }catch(e){ console.error('Upload error:',e); alert('上传失败: 网络错误'); }
  document.getElementById('img-file-input').value='';
}
async function uploadGalleryImage(){
  const file=document.getElementById('img-gallery-input').files[0];
  if(!file)return;
  const fd=new FormData(); fd.append('file',file);
  try{
    const res=await fetch('/api/upload',{method:'POST',credentials:'include',body:fd});
    if(res.ok){ const d=await res.json(); editImages.push(d.url); renderEditImages(); }
    else{ const err=await res.json().catch(()=>({})); alert('上传失败: '+(err.error||res.status)); }
  }catch(e){ console.error('Upload error:',e); alert('上传失败: 网络错误'); }
  document.getElementById('img-gallery-input').value='';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Account
let accountEmailVerified = false;
let accountEmail = null;

async function loadAccountInfo(){
  try{
    const res=await fetch('/api/auth/me',{credentials:'include',headers:getHeaders()});
    if(!res.ok)return;
    const d=await res.json();
    accountEmailVerified = d.email_verified;
    accountEmail = d.email || null;
    const status=document.getElementById('account-email-status');
    const emailInput=document.getElementById('acc-email');
    const codeSection=document.getElementById('acc-email-code-section');
    const hint=document.getElementById('acc-email-hint');
    const actionBtn=document.getElementById('acc-email-action-btn');
    const msg=document.getElementById('acc-email-msg');

    if(d.email && d.email_verified){
      // State: bound and verified
      status.textContent='已绑定: '+d.email+' (已验证)';
      status.style.color='var(--green)';
      emailInput.value=d.email;
      emailInput.disabled=true;
      codeSection.classList.remove('hidden');
      hint.classList.add('hidden');
      actionBtn.textContent='解绑邮箱';
      actionBtn.disabled=true;
      actionBtn.style.opacity='0.5';
      msg.classList.add('hidden');
    }else if(d.email && !d.email_verified){
      // State: bound but not verified (pending)
      status.textContent='已绑定: '+d.email+' (待验证)';
      status.style.color='var(--muted)';
      emailInput.value=d.email;
      emailInput.disabled=false;
      codeSection.classList.remove('hidden');
      hint.classList.add('hidden');
      actionBtn.textContent='确认绑定';
      actionBtn.disabled=false;
      actionBtn.style.opacity='1';
    }else{
      // State: not bound
      status.textContent='尚未绑定邮箱';
      status.style.color='var(--muted)';
      emailInput.value='';
      emailInput.disabled=false;
      codeSection.classList.add('hidden');
      hint.classList.add('hidden');
      actionBtn.textContent='绑定邮箱';
      actionBtn.disabled=false;
      actionBtn.style.opacity='1';
    }
    // Show/hide password code section
    document.getElementById('acc-pw-code-section').classList.toggle('hidden', !d.email_verified);
  }catch(e){console.error(e)}
}

async function sendPwCode(){
  try{
    const res=await fetch('/api/auth/send-code',{method:'POST',credentials:'include',headers:getHeaders()});
    const d=await res.json();
    if(res.ok){
      const btn=document.getElementById('acc-pw-send-btn');
      const orig=btn.textContent;
      btn.textContent='已发送 ('+(d.maskedEmail||'')+')';
      btn.disabled=true;
      setTimeout(()=>{btn.textContent=orig;btn.disabled=false;},60000);
    }else{
      const msg=document.getElementById('acc-pw-msg');
      msg.textContent=d.error||'发送失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
    }
  }catch(e){console.error(e);}
}

let sendCooldown = 0;

async function sendEmailCode(){
  if(sendCooldown > 0)return;
  const msg=document.getElementById('acc-email-msg');
  msg.classList.add('hidden');
  try{
    const res=await fetch('/api/auth/send-code',{method:'POST',credentials:'include',headers:getHeaders()});
    const d=await res.json();
    if(res.ok){
      const btn=document.getElementById('acc-email-send-btn');
      const orig=btn.textContent;
      btn.textContent='已发送 ('+(d.maskedEmail||'')+')';
      btn.disabled=true;
      // Enable unbind button if in bound state
      const actionBtn=document.getElementById('acc-email-action-btn');
      actionBtn.disabled=false;
      actionBtn.style.opacity='1';
      document.getElementById('acc-email-hint').classList.add('hidden');

      sendCooldown=60;
      const timer=setInterval(()=>{
        sendCooldown--;
        if(sendCooldown<=0){clearInterval(timer);btn.textContent=orig;btn.disabled=false;}
        else{btn.textContent=sendCooldown+'s 后可重发';}
      },1000);
    }else{
      msg.textContent=d.error||'发送失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
    }
  }catch(e){console.error(e);}
}

async function changePassword(){
  const oldPw=document.getElementById('acc-old-pw').value;
  const newPw=document.getElementById('acc-new-pw').value;
  const newPw2=document.getElementById('acc-new-pw2').value;
  const msg=document.getElementById('acc-pw-msg');
  msg.classList.add('hidden');
  if(!oldPw||!newPw||!newPw2){msg.textContent='请填写所有密码字段';msg.classList.remove('hidden');msg.style.color='var(--red)';return;}
  if(newPw!==newPw2){msg.textContent='两次新密码不一致';msg.classList.remove('hidden');msg.style.color='var(--red)';return;}
  if(newPw.length<8||newPw.length>32||!/[A-Z]/.test(newPw)||!/[a-z]/.test(newPw)||!/[0-9]/.test(newPw)){
    msg.textContent='密码需8-32位，包含大小写字母和数字';msg.classList.remove('hidden');msg.style.color='var(--red)';return;
  }
  const body={oldPassword:oldPw,newPassword:newPw};
  if(accountEmailVerified){
    const code=document.getElementById('acc-pw-code').value.trim();
    if(code.length!==6){msg.textContent='请输入邮箱验证码';msg.classList.remove('hidden');msg.style.color='var(--red)';return;}
    body.code=code;
  }
  try{
    const res=await fetch('/api/auth/change-password',{method:'POST',credentials:'include',headers:getHeaders(),body:JSON.stringify(body)});
    const d=await res.json();
    if(res.ok){
      msg.textContent='密码修改成功';msg.classList.remove('hidden');msg.style.color='var(--green)';
      document.getElementById('acc-old-pw').value='';document.getElementById('acc-new-pw').value='';document.getElementById('acc-new-pw2').value='';
      document.getElementById('acc-pw-code').value='';
    }else{
      msg.textContent=d.error||'修改失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
    }
  }catch(e){console.error(e);}
}

async function emailAction(){
  const msg=document.getElementById('acc-email-msg');
  const hint=document.getElementById('acc-email-hint');
  msg.classList.add('hidden');

  // State: not bound -> bind email
  if(!accountEmail){
    const email=document.getElementById('acc-email').value.trim();
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      msg.textContent='请输入有效的邮箱地址';msg.classList.remove('hidden');msg.style.color='var(--red)';return;
    }
    try{
      const res=await fetch('/api/auth/bind-email',{method:'POST',credentials:'include',headers:getHeaders(),body:JSON.stringify({email})});
      const d=await res.json();
      if(res.ok){
        msg.textContent=d.message||'验证码已发送';msg.classList.remove('hidden');msg.style.color='var(--green)';
        accountEmail=email;
        document.getElementById('acc-email-code-section').classList.remove('hidden');
        document.getElementById('acc-email-action-btn').textContent='确认绑定';
      }else{
        msg.textContent=d.error||'发送失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
      }
    }catch(e){console.error(e);}
    return;
  }

  // State: bound but not verified -> verify
  if(accountEmail && !accountEmailVerified){
    const code=document.getElementById('acc-email-code').value.trim();
    if(code.length!==6){
      msg.textContent='请输入6位验证码';msg.classList.remove('hidden');msg.style.color='var(--red)';return;
    }
    try{
      const res=await fetch('/api/auth/verify-email',{method:'POST',credentials:'include',headers:getHeaders(),body:JSON.stringify({code})});
      const d=await res.json();
      if(res.ok){
        msg.textContent='邮箱绑定成功';msg.classList.remove('hidden');msg.style.color='var(--green)';
        loadAccountInfo();
      }else{
        msg.textContent=d.error||'验证失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
      }
    }catch(e){console.error(e);}
    return;
  }

  // State: bound and verified -> unbind
  const code=document.getElementById('acc-email-code').value.trim();
  if(code.length!==6){
    hint.textContent='请输入验证码后解绑';hint.classList.remove('hidden');
    return;
  }
  hint.classList.add('hidden');
  try{
    const res=await fetch('/api/auth/unbind-email',{method:'POST',credentials:'include',headers:getHeaders(),body:JSON.stringify({code})});
    const d=await res.json();
    if(res.ok){
      msg.textContent='邮箱已解绑';msg.classList.remove('hidden');msg.style.color='var(--green)';
      document.getElementById('acc-email-code').value='';
      accountEmail=null;
      accountEmailVerified=false;
      loadAccountInfo();
    }else{
      msg.textContent=d.error||'解绑失败';msg.classList.remove('hidden');msg.style.color='var(--red)';
    }
  }catch(e){console.error(e);}
}

    const d=await res.json();
    if(res.ok){
      const btn=document.getElementById('fg-send-btn');
      const orig=btn.textContent;
      btn.textContent='已发送 ('+(d.maskedEmail||'')+')';
      fgCooldown=60;
      const timer=setInterval(()=>{
        fgCooldown--;
        if(fgCooldown<=0){clearInterval(timer);btn.textContent=orig;}
        else{btn.textContent=fgCooldown+'s 后可重发';}
      },1000);
    }else{
      err.textContent=d.error||'发送失败';err.classList.remove('hidden');
    }
  }catch(e){console.error(e);}
}

async function doResetPassword(){
  const username=document.getElementById('fg-user').value.trim();
  const newPw=document.getElementById('fg-new-pw').value;
  const newPw2=document.getElementById('fg-new-pw2').value;
  const err=document.getElementById('fg-error');
  const msg=document.getElementById('fg-msg');
  err.classList.add('hidden');msg.classList.add('hidden');
  if(!username||!newPw||!newPw2){err.textContent='请填写所有字段';err.classList.remove('hidden');return;}
  if(newPw!==newPw2){err.textContent='两次新密码不一致';err.classList.remove('hidden');return;}
  if(newPw.length<8||newPw.length>32||!/[A-Z]/.test(newPw)||!/[a-z]/.test(newPw)||!/[0-9]/.test(newPw)){
    err.textContent='密码需8-32位，包含大小写字母和数字';err.classList.remove('hidden');return;
  }
  const body={username,newPassword:newPw};
  const code=document.getElementById('fg-code').value.trim();
  if(code.length===6)body.code=code;
  try{
    const res=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await res.json();

      msg.textContent='密码重置成功，请返回登录';msg.classList.remove('hidden');msg.style.color='var(--green)';

    }else{
      err.textContent=d.error||'重置失败';err.classList.remove('hidden');
    }
  }catch(e){console.error(e);}
}

function loadVisits(){
  const days=document.getElementById('visits-range').value;
  fetch('/api/visits?days='+days,{credentials:'include',headers:getHeaders()})
    .then(r=>r.json())
    .then(data=>{
      const canvas=document.getElementById('visits-canvas');
      const ctx=canvas.getContext('2d');
      const dpr=window.devicePixelRatio||1;
      const rect=canvas.getBoundingClientRect();
      canvas.width=rect.width*dpr;
      canvas.height=rect.height*dpr;
      ctx.scale(dpr,dpr);
      drawLineChart(ctx,data,rect.width,rect.height);
    });
}

function drawLineChart(ctx,data,W,H){
  const P={top:20,right:20,bottom:50,left:50};
  const pw=W-P.left-P.right;
  const ph=H-P.top-P.bottom;
  const max=Math.max(...data.map(d=>d.count),1);
  const yMax=Math.ceil(max*1.2)||1;

  // Clear
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  const ySteps=5;
  for(let i=0;i<=ySteps;i++){
    const y=P.top+(ph/ySteps)*i;
    ctx.beginPath(); ctx.moveTo(P.left,y); ctx.lineTo(W-P.right,y); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font='11px -apple-system,sans-serif';
    ctx.textAlign='right';
    ctx.fillText(Math.round(yMax-(yMax/ySteps)*i),P.left-8,y+4);
  }

  // X labels
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  const step=Math.max(1,Math.floor(data.length/6));
  for(let i=0;i<data.length;i+=step){
    const x=P.left+(pw/(data.length-1))*i;
    const d=data[i].date.slice(5);
    ctx.fillText(d,x,H-P.bottom+18);
  }

  if(max===0){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='14px -apple-system,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('暂无访问记录',W/2,H/2);
    return;
  }

  // Area fill
  ctx.beginPath();
  for(let i=0;i<data.length;i++){
    const x=P.left+(pw/(data.length-1))*i;
    const y=P.top+ph-(data[i].count/yMax)*ph;
    if(i===0)ctx.moveTo(x,P.top+ph);
    ctx.lineTo(x,y);
  }
  ctx.lineTo(P.left+pw,P.top+ph);
  ctx.closePath();
  const g=ctx.createLinearGradient(0,P.top,0,P.top+ph);
  g.addColorStop(0,'rgba(96,165,250,0.2)');
  g.addColorStop(1,'rgba(96,165,250,0.02)');
  ctx.fillStyle=g;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle='#60a5fa';
  ctx.lineWidth=2;
  for(let i=0;i<data.length;i++){
    const x=P.left+(pw/(data.length-1))*i;
    const y=P.top+ph-(data[i].count/yMax)*ph;
    if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Dots
  for(let i=0;i<data.length;i++){
    const x=P.left+(pw/(data.length-1))*i;
    const y=P.top+ph-(data[i].count/yMax)*ph;
    ctx.beginPath();
    ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle='#60a5fa';
    ctx.fill();
  }
}

// Messages admin
async function loadAdminMessages() {
  try {
    const res = await fetch('/api/admin/messages', { credentials: 'include', headers: getHeaders() });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const msgs = await res.json();
    const list = document.getElementById('msg-list-admin');
    const count = document.getElementById('msg-count');
    if (!count || !list) return;
    count.textContent = '共 ' + msgs.length + ' 条留言，' + msgs.filter(m => !m.approved).length + ' 条待审';
    if (!msgs.length) {
      list.innerHTML = '<p style="color:var(--muted)">暂无留言。</p>';
      return;
    }
    list.innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:0.9rem"><thead><tr style="border-bottom:1px solid var(--border);color:var(--muted);font-size:0.8rem;text-align:left">'
      + '<th style="padding:0.5rem 0.75rem">昵称</th><th style="padding:0.5rem 0.75rem">来源</th><th style="padding:0.5rem 0.75rem">内容</th><th style="padding:0.5rem 0.75rem">时间</th><th style="padding:0.5rem 0.75rem">状态</th><th style="padding:0.5rem 0.75rem">操作</th>'
      + '</tr></thead><tbody>'
      + msgs.map(m => {
        const t = new Date(m.time);
        const ts = t.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        const status = m.approved ? '<span style="color:var(--green)">已审核</span>' : '<span style="color:var(--muted)">待审核</span>';
        const source = (m.context === 'article' && m.postId)
          ? '<span style="color:var(--accent)">文章 #' + m.postId + '</span>'
          : '<span style="color:var(--muted)">个人信息</span>';
        const actions = m.approved
          ? '<button class="btn-ghost" style="color:#f59e0b" onclick="approveMessage(' + m.id + ',false)">驳回</button>'
          : '<button class="btn-ghost" style="color:var(--green)" onclick="approveMessage(' + m.id + ',true)">通过</button>';
        return '<tr style="border-bottom:1px solid var(--border)">'
          + '<td style="padding:0.5rem 0.75rem;color:var(--accent)">' + esc(m.nickname || '匿名') + '</td>'
          + '<td style="padding:0.5rem 0.75rem;font-size:0.8rem;white-space:nowrap">' + source + '</td>'
          + '<td style="padding:0.5rem 0.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(m.content) + '">' + esc(m.content) + '</td>'
          + '<td style="padding:0.5rem 0.75rem;color:var(--muted);font-size:0.8rem;white-space:nowrap">' + ts + '</td>'
          + '<td style="padding:0.5rem 0.75rem;font-size:0.8rem">' + status + '</td>'
          + '<td style="padding:0.5rem 0.75rem">'
          + actions
          + ' <button class="btn-ghost btn-danger" style="font-size:0.8rem" onclick="deleteMessage(' + m.id + ')">删除</button>'
          + '</td></tr>';
      }).join('')
      + '</tbody></table>';
  } catch (e) {
    console.error('Load messages error:', e);
  }
}

async function approveMessage(id, approved) {
  try {
    await fetch('/api/admin/messages/' + id, {
      method: 'PUT', credentials: 'include', headers: getHeaders(),
      body: JSON.stringify({ approved })
    });
    loadAdminMessages();
  } catch (e) { console.error(e); }
}

async function deleteMessage(id) {
  if (!confirm('确认删除这条留言？')) return;
  try {
    await fetch('/api/admin/messages/' + id, {
      method: 'DELETE', credentials: 'include', headers: getHeaders()
    });
    loadAdminMessages();
  } catch (e) { console.error(e); }
}

window.addEventListener('resize',()=>{
  if(document.getElementById('tab-visits').classList.contains('active')) loadVisits();
});

function initEditorPaste(){
  const editor=document.getElementById('edit-content');
  if(!editor)return;
  editor.addEventListener('paste',async(e)=>{
    const items=e.clipboardData?.items;
    if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const file=item.getAsFile();
        try{
          const fd=new FormData();fd.append('file',file);
          const res=await fetch('/api/upload',{method:'POST',credentials:'include',body:fd});
          if(res.ok){
            const d=await res.json();
            document.execCommand('insertHTML',false,'<img src="'+d.url+'" alt="">');
          }
        }catch(ex){console.error('Paste image upload failed:',ex);}
        break;
      }
    }
  });
}
initEditorPaste();
